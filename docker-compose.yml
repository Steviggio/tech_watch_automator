version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: techwatch_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-techwatch}
    ports:
      - "5432:5432"
    volumes:
      - techwatch_pgdata:/var/lib/postgresql/data
    restart: always

  web:
    build: 
      context: ./platform
      dockerfile: Dockerfile.web
    container_name: techwatch_web
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-techwatch}?schema=public
    depends_on:
      - db
    restart: always

  worker:
    build:
      context: ./platform
      dockerfile: Dockerfile.worker
    container_name: techwatch_worker
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-techwatch}?schema=public
    depends_on:
      - db
    restart: always

  nginx:
    image: nginx:alpine
    container_name: techwatch_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
    restart: always

volumes:
  techwatch_pgdata:
