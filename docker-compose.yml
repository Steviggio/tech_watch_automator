services:
  web:
    build: 
      context: ./platform
      dockerfile: Dockerfile.web
    container_name: techwatch_web
    env_file:
      - ./platform/.env
    restart: unless-stopped

  worker:
    build:
      context: ./platform
      dockerfile: Dockerfile.worker
    container_name: techwatch_worker
    env_file:
      - ./platform/.env
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: techwatch_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
    restart: unless-stopped

